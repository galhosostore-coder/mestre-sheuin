version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    container_name: qdrant
    ports:
      - "6333:6333"
      - "6334:6334"
    volumes:
      - qdrant_storage:/qdrant/storage
    restart: always

  postgres:
    image: postgres:15
    container_name: postgres
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: adminpassword
      POSTGRES_DB: defaultdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  redis:
    image: redis:alpine
    container_name: redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: always

  evolution:
    image: atendai/evolution-api:v2.2.0
    container_name: evolution
    ports:
      - "8080:8080"
    environment:
      - AUTHENTICATION_API_KEY=SecretaEvolution-2026-SuperKey
      - DATABASE_PROVIDER=postgresql
      - DATABASE_CONNECTION_URI=postgresql://root:adminpassword@postgres:5432/defaultdb?schema=public
      - REDIS_URI=redis://redis:6379
      - CACHE_REDIS_URI=redis://redis:6379
      - SERVER_URL=http://evolution:8080
      - CORS_ORIGIN=*
      - LOG_LEVEL=ERROR,WARN,DEBUG,INFO,LOG,VERBOSE,DARK,FATAL
      - SERVER_PORT=8080
      - CONFIG_SESSION_PHONE_VERSION=2.3000.1025062854
      - DATABASE_SAVE_DATA_INSTANCE=true
      - DATABASE_SAVE_DATA_CHATS=true
    volumes:
      - evolution_instances:/Evolution/instances
      - evolution_store:/Evolution/store
    depends_on:
      - postgres
      - redis
    restart: always

volumes:
  qdrant_storage:
  postgres_data:
  redis_data:
  evolution_instances:
  evolution_store: